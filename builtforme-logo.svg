<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Full-bleed crimson background. iOS rounds the corners automatically on home screen. -->
  <rect width="180" height="180" fill="#9E1B32"/>
  <!-- Upper chevron (bold) -->
  <path d="M 50 105 L 90 65 L 130 105"
        stroke="#FFFFFF" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Lower chevron (translucent echo, for the layered look) -->
  <path d="M 50 135 L 90 95 L 130 135"
        stroke="#FFFFFF" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
</svg>
